<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>تسجيل الدخول — Church Mega Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/components.css">
<style>
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f1b2d,#1e3254);padding:1rem}
  .login-card{width:100%;max-width:420px;background:var(--card);border-radius:20px;padding:2.5rem;box-shadow:0 30px 60px rgba(0,0,0,.3)}
  .brand{text-align:center;margin-bottom:2rem}
  .brand .logo{width:72px;height:72px;border-radius:18px;background:linear-gradient(135deg,var(--accent),var(--accent-d));display:inline-flex;align-items:center;justify-content:center;font-size:2rem;color:#fff;margin-bottom:1rem}
  .brand h1{font-size:1.5rem;margin-bottom:.25rem}
  .brand p{color:var(--text2);font-size:.9rem}
  .demo-creds{margin-top:1.5rem;padding:1rem;background:var(--bg2);border-radius:10px;font-size:.8rem}
  .demo-creds b{color:var(--accent)}
</style>
</head>
<body>
  <div class="login-card">
    <div class="brand">
      <div class="logo">⛪</div>
      <h1>Church Mega Platform</h1>
      <p>منصة الإدارة الشاملة للكنائس</p>
    </div>
    <form id="login-form">
      <div class="form-group">
        <label class="form-label">البريد الإلكتروني</label>
        <input class="form-control" type="email" id="email" required placeholder="admin@church.local">
      </div>
      <div class="form-group">
        <label class="form-label">كلمة المرور</label>
        <input class="form-control" type="password" id="password" required placeholder="••••••••">
      </div>
      <label style="display:flex;align-items:center;gap:.5rem;font-size:.85rem;margin-bottom:1rem">
        <input type="checkbox" id="remember"> تذكرني
      </label>
      <button class="btn btn-primary" type="submit" style="width:100%">
        <i class="fa-solid fa-right-to-bracket"></i> دخول
      </button>
      <div id="error" style="color:var(--red);margin-top:1rem;text-align:center;font-size:.85rem"></div>
    </form>
    <div class="demo-creds">
      <div><b>مدير كنيسة:</b> admin@church.local / admin123</div>
      <div><b>خادم:</b> mina@church.local / mina123</div>
      <div><b>Super Admin:</b> super@platform.local / super123</div>
    </div>
  </div>

  <script src="data/schema.js"></script>
  <script src="data/mock-data.js"></script>
  <script src="js/db.js"></script>
  <script src="js/auth.js"></script>
  <script>
    DB.all('churches'); // seed
    document.getElementById('login-form').addEventListener('submit', e => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const pwd = document.getElementById('password').value;
      const remember = document.getElementById('remember').checked;
      const result = Auth.login(email, pwd, remember);
      if (!result.ok){
        document.getElementById('error').textContent = result.error;
      } else {
        location.href = result.session.role === 'super_admin' ? 'super-admin.html' : 'dashboard.html';
      }
    });
  </script>
</body>
</html>
